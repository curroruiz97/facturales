<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Correcciones</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #ccc;
        }
        .test.success {
            border-color: #22c55e;
            background: #f0fdf4;
        }
        .test.error {
            border-color: #ef4444;
            background: #fef2f2;
        }
        .test h3 {
            margin: 0 0 10px 0;
        }
        .test p {
            margin: 5px 0;
            color: #666;
        }
        button {
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>
    <h1>🔍 Verificación de Correcciones</h1>
    <p>Esta página verifica que todas las correcciones se aplicaron correctamente.</p>
    
    <button onclick="runTests()">Ejecutar Verificación</button>
    
    <div id="results"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import './assets/js/supabaseClient.js';
        import './assets/js/auth.js';
        import './assets/js/clients.js';
        
        await new Promise(resolve => setTimeout(resolve, 200));
        
        window.runTests = async function() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Ejecutando tests...</p>';
            
            const tests = [];
            
            // Test 1: Supabase inicializado
            tests.push({
                name: 'Supabase Client Inicializado',
                test: () => {
                    return window.supabaseClient !== undefined && window.supabaseClient !== null;
                },
                message: window.supabaseClient ? 'Supabase está inicializado correctamente' : 'ERROR: Supabase no está inicializado'
            });
            
            // Test 2: Funciones de clientes disponibles
            tests.push({
                name: 'Funciones de Clientes Disponibles',
                test: () => {
                    return typeof window.createClient === 'function' &&
                           typeof window.getClients === 'function' &&
                           typeof window.updateClient === 'function';
                },
                message: typeof window.createClient === 'function' ? 'Todas las funciones CRUD disponibles' : 'ERROR: Funciones no disponibles'
            });
            
            // Test 3: Auth functions
            tests.push({
                name: 'Funciones de Autenticación',
                test: () => {
                    return typeof window.signIn === 'function' &&
                           typeof window.signOut === 'function' &&
                           typeof window.checkAuth === 'function';
                },
                message: typeof window.signIn === 'function' ? 'Funciones de auth disponibles' : 'ERROR: Funciones de auth no disponibles'
            });
            
            // Test 4: Usuario autenticado
            let userTest = {
                name: 'Usuario Autenticado',
                test: false,
                message: 'Verificando...'
            };
            
            const isAuth = await window.checkAuth();
            userTest.test = isAuth;
            userTest.message = isAuth ? 'Usuario autenticado correctamente' : 'ADVERTENCIA: No hay usuario logueado';
            tests.push(userTest);
            
            // Test 5: Puede leer clientes
            let clientsTest = {
                name: 'Puede Leer Clientes',
                test: false,
                message: 'Verificando...'
            };
            
            try {
                const result = await window.getClients();
                clientsTest.test = result.success;
                clientsTest.message = result.success ? 
                    `Se pueden leer clientes (${result.data.length} encontrados)` : 
                    `ERROR: ${result.error}`;
            } catch (e) {
                clientsTest.message = `ERROR: ${e.message}`;
            }
            tests.push(clientsTest);
            
            // Test 6: Modal Cliente class
            tests.push({
                name: 'Clase ClienteModal Cargada',
                test: () => {
                    return typeof window.ClienteModal !== 'undefined';
                },
                message: typeof window.ClienteModal !== 'undefined' ? 'ClienteModal disponible' : 'ERROR: ClienteModal no cargada'
            });
            
            // Renderizar resultados
            let html = '<h2>Resultados:</h2>';
            let passed = 0;
            let failed = 0;
            
            tests.forEach(test => {
                const success = typeof test.test === 'function' ? test.test() : test.test;
                const className = success ? 'success' : 'error';
                
                if (success) passed++;
                else failed++;
                
                html += `
                    <div class="test ${className}">
                        <h3>${success ? '✅' : '❌'} ${test.name}</h3>
                        <p>${test.message}</p>
                    </div>
                `;
            });
            
            html += `<div class="test ${failed === 0 ? 'success' : 'error'}">
                <h3>Resumen</h3>
                <p>${passed} de ${tests.length} tests pasaron</p>
                ${failed === 0 ? '<p><strong>✅ TODO FUNCIONA CORRECTAMENTE</strong></p>' : '<p><strong>⚠️ Hay problemas que resolver</strong></p>'}
            </div>`;
            
            results.innerHTML = html;
        };
    </script>
</body>
</html>
