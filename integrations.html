<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Integraciones - Facturales</title>
    <link rel="stylesheet" href="./assets/css/slick.css" />
    <link rel="stylesheet" href="./assets/css/aos.css" />
    <link rel="stylesheet" href="./assets/css/output.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <!-- layout start -->
    <div class="layout-wrapper active w-full">
      <div class="relative flex w-full">
        <div id="sidebar-container"></div>
        <div
          class="body-wrapper flex-1 overflow-x-hidden dark:bg-darkblack-500"
        >
          <div id="header-container"></div>
          <main
            class="w-full px-6 pb-6 pt-[100px] sm:pt-[156px] xl:px-[48px] xl:pb-[48px]"
          >
            <div class="mb-6">
              <h2 class="text-2xl font-bold text-bgray-900 dark:text-white">Integraciones</h2>
              <p class="text-sm text-bgray-600 dark:text-bgray-50 mt-1">Servicios conectados con Facturales</p>
            </div>

            <div class="grid gap-4 lg:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4">
              <!-- Microsoft Excel -->
              <div class="relative rounded-lg bg-white p-6 dark:bg-darkblack-600">
                <div class="flex items-center space-x-4 mb-4">
                  <div class="shrink-0">
                    <img
                      src="assets/images/integrations/ms_excel.svg"
                      alt="Microsoft Excel"
                      class="w-12 h-12"
                    />
                  </div>
                  <div>
                    <h3 class="text-xl font-bold text-bgray-900 dark:text-white">
                      Microsoft Excel
                    </h3>
                    <span class="text-sm text-bgray-600 dark:text-bgray-50">Datos y hojas de calculo</span>
                  </div>
                </div>

                <p class="text-sm text-bgray-600 dark:text-bgray-50 leading-relaxed mb-6">
                  Excel esta integrado automaticamente en la importacion y exportacion de contactos. Puedes descargar y subir tu lista de clientes en formato .xlsx desde la seccion de Clientes.
                </p>

                <div class="flex items-center gap-2 rounded-lg bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 px-4 py-3">
                  <svg class="w-5 h-5 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                  </svg>
                  <span class="text-sm font-medium text-green-700 dark:text-green-300">Conectado automaticamente</span>
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
    <!-- layout end -->

    <!--scripts -->
    <script src="./assets/js/jquery-3.6.0.min.js"></script>
    <script src="./assets/js/aos.js"></script>
    <script src="./assets/js/slick.min.js"></script>
    <script>
      AOS.init();
    </script>

    <script src="./assets/js/load-components.js"></script>
    <script src="./assets/js/main.js"></script>

    <!-- Supabase y Autenticacion -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./assets/js/supabaseClient.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script src="./assets/js/auth-guard.js"></script>
    <script src="./assets/js/businessInfo.js"></script>
    <script src="./assets/js/subscription-guard.js"></script>

    <!-- User header y logout -->
    <script src="./assets/js/user-header.js"></script>
  </body>
</html>
