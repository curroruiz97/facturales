<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Compra cancelada - Facturales</title>
    <link rel="stylesheet" href="../assets/css/output.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <section class="bg-white dark:bg-darkblack-500 min-h-screen flex flex-col">
      <!-- Header con logo -->
      <div class="px-5 xl:px-12 pt-10 pb-6">
        <header class="max-w-[1200px] mx-auto">
          <a href="../index.html">
            <img src="../assets/images/logo/logo-color.svg" class="block dark:hidden" alt="Logo" />
            <img src="../assets/images/logo/logo-white.svg" class="hidden dark:block" alt="Logo" />
          </a>
        </header>
      </div>

      <!-- Contenido centrado -->
      <div class="flex-1 flex items-center justify-center px-5">
        <div style="max-width: 460px; width: 100%;">
          <div class="rounded-2xl bg-white dark:bg-darkblack-600 border border-bgray-200 dark:border-darkblack-400 p-8 text-center shadow-md">

            <!-- Icono de cancelación -->
            <div class="mx-auto mb-6">
              <div class="w-16 h-16 rounded-full bg-bgray-100 dark:bg-darkblack-500 flex items-center justify-center mx-auto">
                <svg class="w-9 h-9 text-bgray-500 dark:text-bgray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="9" stroke-width="1.8"></circle>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 9l-6 6M9 9l6 6"></path>
                </svg>
              </div>
            </div>

            <h1 class="text-bgray-900 dark:text-white text-2xl font-bold font-poppins mb-3">
              Pago cancelado
            </h1>
            <p class="text-bgray-500 dark:text-bgray-300 text-sm mb-8 leading-relaxed">
              No te preocupes, no se ha realizado ningún cargo.<br>
              Puedes volver a seleccionar un plan cuando estés listo.
            </p>

            <!-- Botón -->
            <a
              id="btn-back-plans"
              href="../subscribe.html"
              class="py-3.5 flex items-center justify-center gap-2 text-white font-bold bg-success-300 hover:bg-success-400 transition-all rounded-xl w-full text-base"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
              </svg>
              Ver planes de nuevo
            </a>

          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="px-5 py-6 text-center">
        <p class="text-bgray-600 dark:text-white text-sm">
          &copy; 2026 Facturales. Todos los derechos reservados.
        </p>
      </div>
    </section>

    <!-- Scripts -->
    <script>
      (function () {
        // TODO: Ruta principal de la app. Ajustar si cambia.
        var APP_HOME_ROUTE = '../index.html';

        // =============================================
        // Conservar query param ?plan= si existe
        // =============================================
        var params = new URLSearchParams(window.location.search);
        var plan = (params.get('plan') || '').toLowerCase();
        var validPlans = ['starter', 'pro', 'business'];

        var btnBackPlans = document.getElementById('btn-back-plans');

        if (plan && validPlans.indexOf(plan) !== -1) {
          btnBackPlans.href = '../subscribe.html?plan=' + plan;
        }
      })();
    </script>
  </body>
</html>
