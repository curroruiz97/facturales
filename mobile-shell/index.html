<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Facturales</title>
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: #fff7ed;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #1a202c;
      }
      .wrap {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
      }
      .logo {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #1a202c;
      }
      .logo span { color: #ec8228; }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #fed7aa;
        border-top-color: #ec8228;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .hint { font-size: 13px; color: #718096; max-width: 320px; line-height: 1.5; }
      .btn {
        margin-top: 6px;
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: #ec8228;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        padding: 12px 28px;
        cursor: pointer;
      }
      .btn:active { background: #d47524; }
      .btn.outline {
        background: transparent;
        color: #ec8228;
        border: 1px solid #ec8228;
      }
      .diag {
        margin-top: 12px;
        max-width: 340px;
        font-size: 11px;
        color: #9a3412;
        background: rgba(0,0,0,0.04);
        padding: 10px 12px;
        border-radius: 10px;
        text-align: left;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        word-break: break-all;
      }
      [hidden] { display: none !important; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap" id="loading">
      <div class="logo">Factura<span>les</span></div>
      <div class="spinner" aria-label="Cargando"></div>
      <div class="hint" id="hint">Cargando la aplicación…</div>
    </div>

    <div class="wrap" id="fallback" hidden>
      <div class="logo">Factura<span>les</span></div>
      <div class="hint" id="fail-msg">No hemos podido cargar la aplicación. Pulsa el botón para abrirla.</div>
      <button class="btn" onclick="goRemote(true)">Abrir Facturales</button>
      <button class="btn outline" onclick="retry()">Reintentar</button>
      <div class="diag" id="diag"></div>
    </div>

    <script>
      // URL del backend Facturales (debe coincidir con server.url de capacitor.config.ts)
      var REMOTE = 'https://app.facturales.es/';

      function showFallback(reason) {
        document.getElementById('loading').hidden = true;
        var fb = document.getElementById('fallback');
        fb.hidden = false;
        var diag = document.getElementById('diag');
        diag.textContent =
          'Motivo: ' + reason + '\n' +
          'URL: ' + REMOTE + '\n' +
          'UA: ' + (navigator.userAgent || '-') + '\n' +
          'Capacitor: ' + (window.Capacitor ? 'sí' : 'no') + '\n' +
          'Online: ' + (navigator.onLine ? 'sí' : 'no');
      }

      function goRemote(force) {
        try {
          window.location.replace(REMOTE);
        } catch (e) {
          showFallback('navegación lanzó: ' + (e && e.message ? e.message : e));
        }
      }

      function retry() {
        document.getElementById('loading').hidden = false;
        document.getElementById('fallback').hidden = true;
        startNavigation();
      }

      // Si Capacitor está disponible, él ya está manejando la navegación al server.url.
      // Si no aparece tras 1.5s, asumimos que NO estamos en Capacitor (web puro) o
      // hubo un fallo y hacemos la navegación manualmente.
      function startNavigation() {
        var attempted = false;
        var timer = setTimeout(function () {
          if (attempted) return;
          attempted = true;
          // Si Capacitor no llegó a navegar, lo hacemos nosotros.
          goRemote(false);
        }, 1500);

        // Si pasa más tiempo y seguimos aquí, mostramos fallback con diagnóstico.
        setTimeout(function () {
          if (document.getElementById('loading').hidden) return;
          showFallback('timeout 8s — el WebView no abandonó esta pantalla');
        }, 8000);
      }

      window.addEventListener('error', function (e) {
        showFallback('error JS: ' + (e && e.message ? e.message : 'desconocido'));
      });

      startNavigation();
    </script>
  </body>
</html>
