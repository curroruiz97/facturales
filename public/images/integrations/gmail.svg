<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Left vertical bar (blue) -->
  <rect x="8" y="12" width="14" height="72" rx="4" fill="#4285F4"/>
  <!-- Right vertical bar (green) -->
  <rect x="74" y="12" width="14" height="72" rx="4" fill="#34A853"/>
  <!-- Yellow circle top-right -->
  <circle cx="74" cy="16" r="8" fill="#FBBC04"/>
  <!-- Red left diagonal -->
  <polygon points="8,16 48,50 48,42 16,12 8,12" fill="#EA4335"/>
  <!-- Red right diagonal -->
  <polygon points="88,16 48,50 48,42 80,12 88,12" fill="#EA4335"/>
  <!-- Red center V -->
  <polygon points="22,20 48,44 74,20 74,28 48,52 22,28" fill="#EA4335"/>
  <!-- Darker red overlap left -->
  <polygon points="8,18 22,28 22,20 8,12" fill="#C5221F" opacity="0.4"/>
  <!-- Darker green overlap right -->
  <polygon points="88,18 74,28 74,20 88,12" fill="#1E8E3E" opacity="0.4"/>
</svg>
