<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Soporte - Facturales</title>
    <script type="module" crossorigin src="/assets/support-ticket-fuvatxrg.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/auth-D0V1IyeF.js">
    <link rel="modulepreload" crossorigin href="/assets/businessInfo-DUlvmxyV.js">
    <link rel="modulepreload" crossorigin href="/assets/auth-guard-C6jxfgRt.js">
    <link rel="stylesheet" crossorigin href="/assets/support-ticket-D5k_pI80.css">
    <link rel="stylesheet" crossorigin href="/assets/style-C65zA0qN.css">
  </head>
  <body>
    <div class="layout-wrapper active w-full">
      <div class="relative flex w-full">
        <div id="sidebar-container"></div>
        <div
          class="body-wrapper flex-1 overflow-x-hidden dark:bg-darkblack-700"
        >
          <div id="header-container"></div>
          <main
            class="w-full px-6 pb-6 pt-[100px] sm:pt-[156px] xl:px-[48px] xl:pb-[48px]"
          >
            <div class="rounded-lg bg-white px-6 py-8 dark:bg-darkblack-600">
              <div class="justify-between gap-12 2xl:flex">
                <form action="" class="flex-1">
                  <div class="grid gap-6 md:grid-cols-2">
                    <div>
                      <label
                        for="fn"
                        class="text-base mb-2 block font-medium text-bgray-600 dark:text-bgray-50"
                        >Nombre</label
                      >
                      <input
                        type="text"
                        class="w-full rounded-lg border-0 bg-bgray-50 p-4 focus:border focus:border-success-300 focus:ring-0 dark:bg-darkblack-500 dark:text-white"
                      />
                    </div>
                    <div>
                      <label
                        for="ln"
                        class="text-base mb-2 block font-medium text-bgray-600 dark:text-bgray-50"
                        >Apellido</label
                      >
                      <input
                        type="text"
                        class="w-full rounded-lg border-0 bg-bgray-50 p-4 focus:border focus:border-success-300 focus:ring-0 dark:bg-darkblack-500 dark:text-white"
                      />
                    </div>
                    <div>
                      <label
                        for="email"
                        class="text-base mb-2 block font-medium text-bgray-600 dark:text-bgray-50"
                        >Correo electrónico</label
                      >
                      <input
                        type="text"
                        class="w-full rounded-lg border-0 bg-bgray-50 p-4 focus:border focus:border-success-300 focus:ring-0 dark:bg-darkblack-500 dark:text-white"
                      />
                    </div>
                    <div>
                      <label
                        for="fn"
                        class="text-base mb-2 block font-medium text-bgray-600 dark:text-bgray-50"
                        >Número de teléfono (opcional)</label
                      >
                      <input
                        type="text"
                        class="w-full rounded-lg border-0 bg-bgray-50 p-4 focus:border focus:border-success-300 focus:ring-0 dark:bg-darkblack-500 dark:text-white"
                      />
                    </div>
                  </div>
                  <div class="mb-6 mt-10">
                    <h4
                      class="mb-4 text-lg font-bold text-bgray-900 dark:text-white"
                    >
                      Problemas de soporte
                    </h4>
                    <label
                      for=""
                      class="mb-2 block text-base font-semibold dark:text-white"
                      >Título</label
                    >
                    <input
                      type="text"
                      class="w-full rounded-lg border-0 bg-bgray-50 p-4 focus:border focus:border-success-300 focus:ring-0 dark:bg-darkblack-500 dark:text-white"
                    />
                  </div>
                  <div class="custom-quill mb-6 mt-10">
                    <label
                      for=""
                      class="mb-2 block text-base font-semibold dark:text-white"
                      >Descripción</label
                    >
                    <div class="h-60 rounded-b-lg" id="editor"></div>
                  </div>
                  <div class="flex justify-end">
                    <button
                      class="rounded-lg bg-success-300 px-12 py-3.5 font-semibold text-white transition-all hover:bg-success-400"
                    >
                      Enviar ticket
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>

    <script src="./assets/js/jquery-3.6.0.min.js"></script>
    <script src="./assets/js/quill.min.js"></script>
    <script src="./assets/js/main.js"></script>
    <script src="./assets/js/load-components.js"></script>

    <!-- Supabase y Autenticación -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./assets/js/user-header.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var quill = new Quill('#editor', {
          theme: 'snow',
          placeholder: 'Describe tu problema...',
          modules: {
            toolbar: [
              ['bold', 'italic', 'underline'],
              [{ 'list': 'ordered'}, { 'list': 'bullet' }],
              ['link'],
              ['clean']
            ]
          }
        });
      });
    </script>
  </body>
</html>
