<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Contactos</title>
    <script type="module" crossorigin src="/assets/auth-C1W-hfHs.js"></script>
    <script type="module" crossorigin src="/assets/businessInfo-DUlvmxyV.js"></script>
    <script type="module" crossorigin src="/assets/auth-guard-t0CGVzNF.js"></script>
    <script type="module" crossorigin src="/assets/clients-zPGFUPb3.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/style-BoAMvr2Z.css">
  </head>
  <body>
    <!-- layout start -->
    <div class="layout-wrapper active w-full">
      <div class="relative flex w-full">
        <div id="sidebar-container"></div>
        <div
          class="body-wrapper flex-1 overflow-x-hidden dark:bg-darkblack-700"
        >
          <div id="header-container"></div>
          <main
            class="w-full px-6 pb-6 pt-[100px] sm:pt-[156px] xl:px-[48px] xl:pb-[48px]"
          >
<!-- CLIENTES -->
<div class="flex flex-col gap-6">
  <!-- Header -->
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div>
      <h2 class="text-2xl font-bold text-bgray-900 dark:text-white">Contactos</h2>
      <p class="text-sm text-bgray-600 dark:text-bgray-50">Gestiona tus clientes recurrentes</p>
    </div>

    <button
      type="button"
      class="modal-open inline-flex items-center justify-center gap-2 rounded-lg bg-success-300 px-4 py-3 text-sm font-semibold text-white transition hover:bg-success-400"
    >
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 3.75V14.25" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M3.75 9H14.25" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Nuevo Cliente
    </button>
  </div>

  <!-- Card: Lista -->
  <div class="w-full rounded-lg bg-white px-[24px] py-[20px] dark:bg-darkblack-600">
    <div class="flex flex-col gap-6">
      <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
        <div>
          <div class="flex items-center gap-2">
            <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-bgray-100 dark:bg-darkblack-500">
              <svg class="stroke-bgray-900 dark:stroke-bgray-50" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12.75 15.75V14.25C12.75 13.4216 12.0784 12.75 11.25 12.75H6.75C5.92157 12.75 5.25 13.4216 5.25 14.25V15.75" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M9 10.5C10.2426 10.5 11.25 9.49264 11.25 8.25C11.25 7.00736 10.2426 6 9 6C7.75736 6 6.75 7.00736 6.75 8.25C6.75 9.49264 7.75736 10.5 9 10.5Z" stroke-width="1.5"/>
              </svg>
            </span>
            <h3 class="text-base font-bold text-bgray-900 dark:text-white">Lista de Contactos</h3>
          </div>
          <p class="mt-1 text-sm text-bgray-600 dark:text-bgray-50"><span id="clients-count">0</span> clientes registrados</p>
        </div>

        <!-- Search -->
        <div class="searchbar-wrapper">
          <div
            class="px flex h-[56px] w-full items-center justify-between rounded-lg border border-transparent bg-bgray-50 px-4 focus-within:border-success-300 dark:bg-darkblack-500 lg:w-[420px]"
          >
            <div class="flex w-full items-center space-x-3.5">
              <span>
                <svg class="stroke-bgray-900 dark:stroke-bgray-50" fill="none" height="20" width="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="9.78639" cy="9.78602" r="8.23951" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></circle>
                  <path d="M15.5176 15.9447L18.7479 19.1667" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                </svg>
              </span>
              <label class="w-full" for="clients-search">
                <input
                  id="clients-search"
                  type="text"
                  placeholder="Buscar clientes..."
                  oninput="handleSearchClients(this.value)"
                  class="search-input w-full border-none bg-bgray-50 bg-none text-sm font-medium text-bgray-900 placeholder:text-sm placeholder:font-medium placeholder:text-bgray-500 focus:outline-none dark:bg-darkblack-500 dark:text-white"
                />
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="w-full overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="border-b border-bgray-300 dark:border-darkblack-400">
              <td class="whitespace-nowrap py-4 pr-6">
                <span class="text-base font-medium text-bgray-600 dark:text-bgray-50">Cliente</span>
              </td>
              <td class="whitespace-nowrap px-6 py-4">
                <span class="text-base font-medium text-bgray-600 dark:text-bgray-50">Contacto</span>
              </td>
              <td class="whitespace-nowrap px-6 py-4">
                <span class="text-base font-medium text-bgray-600 dark:text-bgray-50">Facturación</span>
              </td>
              <td class="whitespace-nowrap px-6 py-4">
                <span class="text-base font-medium text-bgray-600 dark:text-bgray-50">Estado</span>
              </td>
              <td class="whitespace-nowrap px-6 py-4">
                <span class="text-base font-medium text-bgray-600 dark:text-bgray-50">Facturado</span>
              </td>
              <td class="whitespace-nowrap py-4 pl-6 text-right">
                <span class="text-base font-medium text-bgray-600 dark:text-bgray-50">Acciones</span>
              </td>
            </tr>
          </thead>
          <tbody id="clients-table-body">
            <!-- Las filas se cargarán dinámicamente desde JavaScript -->
          </tbody>
        </table>
      </div>

      <!-- Paginación -->
      <div class="flex w-full items-center justify-center lg:justify-between" id="users-pagination">
        <div class="hidden items-center space-x-4 lg:flex">
          <span class="text-sm font-semibold text-bgray-600 dark:text-bgray-50">Mostrar resultados:</span>
          <div class="relative">
            <button onclick="toggleUsersPerPageDropdown()" type="button" class="flex items-center space-x-6 rounded-lg border border-bgray-300 px-2.5 py-[14px] dark:border-darkblack-400">
              <span class="text-sm font-semibold text-bgray-900 dark:text-bgray-50" id="users-per-page-display">10</span>
              <span><svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.03516 6.03271L8.03516 10.0327L12.0352 6.03271" stroke="#A0AEC0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            </button>
            <div id="users-per-page-filter" class="absolute right-0 top-14 z-10 hidden w-full overflow-hidden rounded-lg bg-white shadow-lg dark:bg-darkblack-500">
              <ul>
                <li onclick="setUsersPerPage(5)" class="cursor-pointer px-5 py-2 text-sm font-medium text-bgray-900 hover:bg-bgray-100 dark:text-white hover:dark:bg-darkblack-600">5</li>
                <li onclick="setUsersPerPage(10)" class="cursor-pointer px-5 py-2 text-sm font-medium text-bgray-900 hover:bg-bgray-100 dark:text-white hover:dark:bg-darkblack-600">10</li>
                <li onclick="setUsersPerPage(25)" class="cursor-pointer px-5 py-2 text-sm font-medium text-bgray-900 hover:bg-bgray-100 dark:text-white hover:dark:bg-darkblack-600">25</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="flex items-center space-x-5 sm:space-x-[35px]" id="users-page-buttons">
          <!-- Los botones de paginación se generan dinámicamente -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- /CLIENTES -->
</main>
        </div>
      </div>
    </div>
    <!-- layout end -->
    
<!-- Modal Unificado de Cliente -->
<div id="multi-step-modal" class="modal fixed inset-0 z-50 hidden items-center justify-center overflow-y-auto bg-black/50 backdrop-blur-sm transition-opacity duration-200" role="dialog" aria-labelledby="modal-title" aria-modal="true">
  <!-- Overlay -->
  <div class="modal-overlay absolute inset-0"></div>
  
  <!-- Modal Content -->
  <div class="modal-content relative w-full max-w-4xl mx-4 my-8 transform transition-all duration-200">
    <div class="relative rounded-2xl bg-white dark:bg-darkblack-600 shadow-2xl border-2 border-success-300">
      <!-- Header -->
      <div class="flex items-center justify-between border-b border-bgray-200 dark:border-darkblack-400 px-6 py-4">
        <h3 class="modal-title text-xl font-bold text-bgray-900 dark:text-white" id="modal-title">
          Nuevo Cliente
        </h3>
        <button 
          type="button" 
          id="step-1-cancel"
          data-action="close-modal"
          class="rounded-lg p-2 text-bgray-500 hover:bg-bgray-100 dark:hover:bg-darkblack-500 transition-colors"
          aria-label="Cerrar modal"
        >
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      
      <!-- Body -->
      <div class="px-6 py-5 max-h-[calc(100vh-200px)] overflow-y-auto">
        <form id="client-form" class="space-y-5">
          <!-- Hidden field para ID (modo edición) -->
          <input type="hidden" id="client-id" />
          
          <!-- Grid de 2 columnas - Responsive -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            
            <!-- Columna 1 -->
            <div class="space-y-4">
              <!-- Nombre / Razón Social -->
              <div>
                <label for="client-name" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  Nombre / Razón Social <span class="text-red-500">*</span>
                </label>
                <input
                  type="text"
                  id="client-name"
                  required
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white placeholder:text-bgray-500 focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                  placeholder="Ej: Empresa S.L."
                />
              </div>
              
              <!-- NIF / CIF -->
              <div>
                <label for="client-taxid" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  NIF / CIF <span class="text-red-500">*</span>
                </label>
                <input
                  type="text"
                  id="client-taxid"
                  required
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white placeholder:text-bgray-500 focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                  placeholder="Ej: B12345678"
                />
              </div>
              
              <!-- Email -->
              <div>
                <label for="client-email" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  Email
                </label>
                <input
                  type="email"
                  id="client-email"
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white placeholder:text-bgray-500 focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                  placeholder="ejemplo@empresa.com"
                />
              </div>
              
              <!-- Teléfono -->
              <div>
                <label for="client-phone" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  Teléfono
                </label>
                <input
                  type="tel"
                  id="client-phone"
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white placeholder:text-bgray-500 focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                  placeholder="+34 600 000 000"
                />
              </div>
              
              <!-- Estado -->
              <div>
                <label for="client-status" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  Estado
                </label>
                <select
                  id="client-status"
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                >
                  <option value="active">Activo</option>
                  <option value="inactive">Inactivo</option>
                </select>
              </div>
            </div>
            
            <!-- Columna 2 -->
            <div class="space-y-4">
              <!-- Dirección -->
              <div>
                <label for="client-address" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  Dirección
                </label>
                <input
                  type="text"
                  id="client-address"
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white placeholder:text-bgray-500 focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                  placeholder="Calle Principal 123"
                />
              </div>
              
              <!-- Código Postal -->
              <div>
                <label for="client-postal-code" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  Código Postal
                </label>
                <input
                  type="text"
                  id="client-postal-code"
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white placeholder:text-bgray-500 focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                  placeholder="28001"
                />
              </div>
              
              <!-- Ciudad -->
              <div>
                <label for="client-city" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  Ciudad
                </label>
                <input
                  type="text"
                  id="client-city"
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white placeholder:text-bgray-500 focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                  placeholder="Madrid"
                />
              </div>
              
              <!-- País -->
              <div>
                <label for="client-country" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  País
                </label>
                <input
                  type="text"
                  id="client-country"
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white placeholder:text-bgray-500 focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                  placeholder="España"
                />
              </div>
              
              <!-- Día de Facturación -->
              <div>
                <label for="client-billing-day" class="mb-2 block text-sm font-semibold text-bgray-900 dark:text-white">
                  Día de Facturación
                </label>
                <select
                  id="client-billing-day"
                  class="w-full h-12 rounded-lg border border-bgray-300 dark:border-darkblack-400 bg-white dark:bg-darkblack-500 px-4 py-3 text-sm text-bgray-900 dark:text-white focus:border-success-300 focus:ring-2 focus:ring-success-300/20 transition-all"
                >
                  <option value="">Sin especificar</option>
                  <option value="1">Día 1</option>
                  <option value="5">Día 5</option>
                  <option value="10">Día 10</option>
                  <option value="15">Día 15</option>
                  <option value="20">Día 20</option>
                  <option value="25">Día 25</option>
                  <option value="30" selected>Día 30</option>
                  <option value="31">Día 31</option>
                </select>
              </div>
            </div>
          </div>
          
          <!-- Footer -->
          <div class="flex items-center justify-end gap-3 border-t border-bgray-200 dark:border-darkblack-400 pt-5 mt-6">
            <button
              type="button"
              id="step-1-cancel-2"
              data-action="close-modal"
              class="rounded-lg border border-bgray-300 dark:border-darkblack-400 px-6 py-2.5 text-sm font-semibold text-bgray-700 dark:text-bgray-50 hover:bg-bgray-50 dark:hover:bg-darkblack-500 transition-colors"
            >
              Cancelar
            </button>
            <button
              type="submit"
              id="client-save-btn"
              class="rounded-lg bg-success-300 px-6 py-2.5 text-sm font-semibold text-white hover:bg-success-400 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Guardar Cliente
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Estilos adicionales para animaciones -->
<style>
  .modal-enter {
    animation: fadeIn 0.2s ease-out;
  }
  
  .modal-content-enter {
    animation: slideIn 0.2s ease-out;
  }
  
  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }
  
  @keyframes slideIn {
    from {
      opacity: 0;
      transform: scale(0.95) translateY(-10px);
    }
    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }
</style>

<!-- Modal: Confirmación de Eliminación -->
<div id="delete-confirm-modal" class="fixed inset-0 z-[9999] hidden flex items-center justify-center overflow-y-auto bg-black/60 backdrop-blur-sm">
  <div class="relative mx-auto w-full max-w-md rounded-lg bg-white p-6 shadow-xl dark:bg-darkblack-600">
    <div class="mb-4">
      <h3 class="text-xl font-bold text-bgray-900 dark:text-white">¿Eliminar cliente?</h3>
      <p class="mt-2 text-sm text-bgray-600 dark:text-bgray-50">
        Esta acción no se puede deshacer. El cliente será eliminado permanentemente.
      </p>
      <p class="mt-3 rounded-lg bg-red-50 p-3 text-sm font-medium text-red-700 dark:bg-red-900/20 dark:text-red-400" id="delete-client-name">
        <!-- Nombre del cliente a eliminar -->
      </p>
    </div>
    <div class="flex gap-3">
      <button
        onclick="closeDeleteModal()"
        class="flex-1 rounded-lg border border-bgray-300 px-4 py-3 text-sm font-semibold text-bgray-900 transition hover:bg-bgray-100 dark:border-darkblack-400 dark:text-white dark:hover:bg-darkblack-500"
      >
        Cancelar
      </button>
      <button
        onclick="confirmDeleteClient()"
        class="flex-1 rounded-lg bg-red-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-red-600"
      >
        Eliminar
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/user-header.js"></script>
<script src="./assets/js/toast.js"></script>
<script src="./assets/js/modal-cliente.js"></script>
<script src="./assets/js/users-page.js"></script>

<script src="./assets/js/jquery-3.6.0.min.js"></script>
    <script src="./assets/js/slick.min.js"></script>
    <script src="./assets/js/quill.min.js"></script>

    <script src="./assets/js/load-components.js"></script>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
